<?xml version="1.0" encoding="UTF-8"?>
<!-- Foreground del adaptive icon de Android — SOLO la llama "Fuego Mundial",
     fondo TRANSPARENTE y centrada dentro de la zona segura (~50% del canvas).
     Android aplica el backgroundColor (#0A0E1A) por separado y enmascara este
     foreground en círculo/squircle. Por eso NO debe llevar fondo ni llenar
     todo el lienzo. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="fire" x1="0" y1="1" x2="0.45" y2="0">
      <stop offset="0%"   stop-color="#DC2626"/>
      <stop offset="50%"  stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>
  </defs>
  <!-- Llama centrada a ~58% del canvas (cabe en la zona segura central del 66%) -->
  <g transform="translate(512 540) scale(4.2) translate(-71.5 -71.5)">
    <g transform="translate(0,143) scale(0.066667,-0.066667)" fill="url(#fire)" stroke="none">
      <path d="M1159 1990 c-204 -198 -163 -460 143 -927 183 -280 207 -394 131 -622 -49 -144 -48 -156 8 -103 165 158 245 316 246 487 1 161 -11 183 -239 455 -273 326 -322 478 -227 703 33 77 12 79 -62 7z"/>
      <path d="M818 1439 c-62 -195 -55 -319 27 -488 153 -313 170 -399 92 -450 -141 -93 -317 148 -333 455 -9 172 -13 177 -72 99 -316 -413 83 -1122 534 -951 183 69 262 189 262 399 0 166 -8 184 -208 528 -171 292 -216 384 -230 471 -13 86 -29 72 -72 -63z"/>
    </g>
  </g>
</svg>
