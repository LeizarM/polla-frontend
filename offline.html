<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Sin conexión — Mundial 2026</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/favicon.png" />
  <meta name="theme-color" content="#0F172A" />
  <style>
    :root { color-scheme: dark; }
    html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, sans-serif; background: linear-gradient(180deg, #0F172A 0%, #1E1B4B 60%, #312E81 100%); color: #fff; }
    .wrap { min-height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 24px; }
    .logo { font-size: 88px; line-height: 1; margin-bottom: 12px; filter: drop-shadow(0 6px 14px rgba(0,0,0,0.4)); animation: pulse 2.2s ease-in-out infinite; }
    h1 { font-size: 28px; margin: 6px 0 4px; letter-spacing: -0.5px; }
    p { color: rgba(255,255,255,0.65); max-width: 380px; line-height: 1.5; font-size: 14px; }
    button {
      margin-top: 24px;
      background: #FFD700; color: #0F172A;
      border: none; border-radius: 999px;
      padding: 12px 22px; font-weight: 800; font-size: 14px;
      letter-spacing: 0.3px; cursor: pointer;
    }
    .badge {
      margin-top: 18px;
      padding: 6px 12px; border-radius: 999px;
      background: rgba(239,68,68,0.18);
      border: 1px solid rgba(239,68,68,0.5);
      color: #fca5a5; font-size: 12px;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .dot { width: 8px; height: 8px; border-radius: 4px; background: #ef4444; animation: blink 1.2s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { transform: scale(1) } 50% { transform: scale(1.06) } }
    @keyframes blink { 0%,100% { opacity: 1 } 50% { opacity: 0.3 } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">⚽</div>
    <h1>Sin conexión</h1>
    <p>No pudimos conectar con el servidor. Lo último que viste sigue disponible — si hiciste una apuesta, la enviaremos automáticamente cuando vuelva tu internet.</p>
    <button onclick="location.reload()">Reintentar</button>
    <div class="badge"><span class="dot"></span> Offline</div>
  </div>
  <script>
    // Auto-reload cuando vuelva la red
    window.addEventListener('online', () => location.reload());
  </script>
</body>
</html>
