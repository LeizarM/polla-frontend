# ════════════════════════════════════════════════════════════════════════
#  Build APK Android con EAS
#
#  Se dispara:
#    - Manualmente desde Actions → "Build APK Android" → Run workflow
#    - Automáticamente al pushear un tag `v*` (ej. v1.0.1, v2.0.0)
#
#  Necesita el secret EXPO_TOKEN en repo settings.
# ════════════════════════════════════════════════════════════════════════
name: Build APK Android

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile (preview = APK, production = AAB)'
        required: true
        default: 'preview'
        type: choice
        options: [preview, production]
  push:
    tags: ['v*']

env:
  EXPO_PUBLIC_API_URL: https://app.esppapel.com:9443
  YARN_ENABLE_IMMUTABLE_INSTALLS: 'false'

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - name: Verify EXPO_TOKEN is set
        run: |
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "❌ EXPO_TOKEN no está configurado en Settings → Secrets → Actions"
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Setup Yarn 4
        run: |
          corepack enable
          corepack prepare yarn@4.13.0 --activate

      - name: Install deps
        run: yarn install

      - name: Build APK (cloud, no-wait)
        run: |
          PROFILE="${{ inputs.profile || 'preview' }}"
          echo "→ Triggering EAS build for profile: $PROFILE"
          eas build --platform android --profile "$PROFILE" --non-interactive --no-wait
