# ════════════════════════════════════════════════════════════════════════
#  Build APK Android con EAS (manual)
#
#  NO se dispara con push — solo cuando lo lanzas tú desde GitHub.
#  Razón: build de APK consume minutos de EAS (limitado en plan gratis).
#
#  Para usarlo:
#    1. Configura el secret EXPO_TOKEN (Settings → Secrets → Actions)
#    2. Ve a Actions → "Build APK Android" → Run workflow
# ════════════════════════════════════════════════════════════════════════
name: Build APK Android

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: true
        default: 'preview'
        type: choice
        options: [preview, production]

env:
  EXPO_PUBLIC_API_URL: https://app.esppapel.com:9443

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - name: Verify EXPO_TOKEN is set
        run: |
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "❌ EXPO_TOKEN no está configurado en Settings → Secrets → Actions"
            exit 1
          fi

      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - run: corepack enable
      - run: yarn install --immutable

      - name: Build APK
        env:
          EXPO_PUBLIC_API_URL: ${{ env.EXPO_PUBLIC_API_URL }}
        run: eas build --platform android --profile ${{ inputs.profile }} --non-interactive --no-wait
