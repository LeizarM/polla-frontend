# ════════════════════════════════════════════════════════════════════════
#  CI/CD del frontend (Expo Web)
# ════════════════════════════════════════════════════════════════════════
name: Build & Deploy Frontend

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  EXPO_PUBLIC_API_URL: https://app.esppapel.com:9443

jobs:
  build-web:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ── Yarn 4 via corepack ──────────────────────────────────────
      - name: Setup Yarn 4
        run: |
          corepack enable
          corepack prepare yarn@4.13.0 --activate
          yarn --version

      # ── Instalar deps. Si no hay yarn.lock o se desincronizó,
      #    cae a install normal (no --immutable) ──────────────────
      - name: Install dependencies
        run: |
          if [ -f yarn.lock ]; then
            yarn install --immutable || yarn install
          else
            yarn install
          fi

      # ── Diagnóstico antes del export ─────────────────────────────
      - name: Debug info
        run: |
          node --version
          yarn --version
          npx --version
          ls -la
          cat package.json | head -50

      # ── Build Expo Web ───────────────────────────────────────────
      - name: Build Expo Web
        env:
          EXPO_PUBLIC_API_URL: ${{ env.EXPO_PUBLIC_API_URL }}
          CI: true
        run: |
          npx expo export --platform web --output-dir dist
          echo "── dist/ contents ──"
          ls -la dist/

      # ── Subir artifact (siempre, aunque luego falle el push) ─────
      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist/
          if-no-files-found: warn

      # ── Force-push dist/ a la rama web-build ─────────────────────
      - name: Push to web-build branch
        run: |
          cd dist
          git init -q
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b web-build
          git add -A
          git commit -q -m "build: ${GITHUB_SHA::7}"
          git push -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" web-build
