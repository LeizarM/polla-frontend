# ════════════════════════════════════════════════════════════════════════
#  CI/CD del frontend (Expo Web)
#
#  Trigger: push a `main`
#  Flujo:
#    1) Build de Expo Web (estático)
#    2) Push del `dist/` a la rama `web-build` (de donde Plesk hace pull)
#
#  Para builds de APK, ver workflow separado: apk.yml (se activa solo si
#  está configurado el secret EXPO_TOKEN).
# ════════════════════════════════════════════════════════════════════════
name: Build & Deploy Frontend

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  EXPO_PUBLIC_API_URL: https://app.esppapel.com:9443

jobs:
  build-web:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable corepack
        run: corepack enable

      - name: Install deps
        run: yarn install --immutable

      - name: Build Expo Web (static export)
        env:
          EXPO_PUBLIC_API_URL: ${{ env.EXPO_PUBLIC_API_URL }}
        run: npx expo export --platform web --output-dir dist

      - name: Subir artifact (debug)
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist/

      # ── Force-push dist/ a la rama web-build ───────────────────────
      # Plesk pulea esa rama y despliega el contenido en
      # /apuestamundial.impexpap.com/
      - name: Push to web-build branch
        run: |
          cd dist
          git init -q
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b web-build
          git add -A
          git commit -q -m "build: ${GITHUB_SHA::7}"
          git push -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" web-build
